name: Run Bridge Scraper

on:
  schedule:
    - cron: '0 0 * * 1' # Runs automatically every Monday at midnight UTC
  workflow_dispatch: # Allows you to click a button and run it manually anytime

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Scraping Dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run Scraper Script
      run: python scraper.py

    - name: Commit and Push CSV changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add bridge_data.csv
        git commit -m "Automated data update" || exit 0
        git pull --rebase origin main
        git push
